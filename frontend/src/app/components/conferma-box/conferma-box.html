<div class="modal-overlay">
  <div class="modal-box">

    <!-- Contenuto del messaggio -->
    <div class="modal-content">
      <p>{{ messaggio }}</p>
    </div>



     <!-- bottoni -->
    <div class="modal-actions">
      <button class="btn btn-annulla" (click)="rispondi(false)">Annulla</button>
      <button class="btn btn-ok" (click)="rispondi(true)">OK</button>
    </div>

  </div>
</div>
